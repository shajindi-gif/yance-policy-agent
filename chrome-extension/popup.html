<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YanCe Policy Agent</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="logo-area">
        <img src="icons/icon48.png" alt="YanCe" class="logo-img" width="32" height="32">
        <div class="logo-text">
          <h1>YanCe Policy Agent</h1>
          <span class="subtitle">yance.ai</span>
        </div>
      </div>
    </header>

    <!-- Action Buttons -->
    <section class="actions">
      <button id="btn-analyze" class="btn btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
        分析当前页面政策
      </button>
      <button id="btn-service-note" class="btn btn-secondary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
        生成园区服务工单
      </button>
    </section>

    <!-- Loading State -->
    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <span>正在分析政策内容...</span>
    </div>

    <!-- Results Area -->
    <section id="results" class="results hidden">

      <!-- Policy Name -->
      <div class="result-card">
        <h3 class="card-title">
          <span class="card-icon">&#127919;</span> 政策名称
        </h3>
        <p id="policy-name" class="card-content card-content-bold"></p>
      </div>

      <!-- Issuing Authority -->
      <div class="result-card">
        <h3 class="card-title">
          <span class="card-icon">&#127963;</span> 发文机构
        </h3>
        <p id="issuing-authority" class="card-content"></p>
      </div>

      <!-- Target Industry -->
      <div class="result-card">
        <h3 class="card-title">
          <span class="card-icon">&#127981;</span> 适用行业
        </h3>
        <div id="target-industry" class="tag-list"></div>
      </div>

      <!-- Subsidy Amount -->
      <div class="result-card result-card-highlight">
        <h3 class="card-title">
          <span class="card-icon">&#128176;</span> 补贴金额/范围
        </h3>
        <p id="subsidy-amount" class="card-content card-content-highlight"></p>
      </div>

      <!-- Application Deadline -->
      <div class="result-card">
        <h3 class="card-title">
          <span class="card-icon">&#128197;</span> 申报期限
        </h3>
        <p id="application-deadline" class="card-content"></p>
      </div>

      <!-- Material Requirements -->
      <div class="result-card">
        <h3 class="card-title">
          <span class="card-icon">&#128196;</span> 材料要求
        </h3>
        <ul id="material-list" class="card-list"></ul>
      </div>

      <!-- Action Buttons Row -->
      <div class="action-buttons-row">
        <button id="btn-copy-parkops" class="btn btn-coral">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          复制到 ParkOps
        </button>
        <button id="btn-open-dashboard" class="btn btn-teal">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
            <polyline points="15 3 21 3 21 9"/>
            <line x1="10" y1="14" x2="21" y2="3"/>
          </svg>
          打开 Dashboard
        </button>
      </div>
    </section>

    <!-- Disclaimer -->
    <div class="disclaimer-box">
      <p class="disclaimer">
        &#9432; 本插件为辅助工具，政策建议需经人工复核
      </p>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <p class="version">v1.0.0 | yance.ai</p>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
